name: Update Tracker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-qwen2.5-1.5b
          restore-keys: |
            ollama-models-

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:1.5b

      - name: Build tracker binary
        run: go build -o tracker ./cmd/tracker

      - name: Run tracker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_HOST: http://localhost:11434
        run: ./tracker

      - name: Record runner profile
        run: |
          mkdir -p config
          jq -n \
            --argjson cpus "$(nproc)" \
            --argjson memory_mb "$(free -m | awk '/^Mem:/{print $2}')" \
            --argjson disk_gb "$(df -BG / | awk 'NR==2{print $4}' | tr -d 'G')" \
            --arg recorded_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{cpus: $cpus, memory_mb: $memory_mb, disk_gb: $disk_gb, recorded_at: $recorded_at}' \
            > config/runner_profile.json

      - name: Commit and push changes
        run: |
          git config user.name "Military Tracker Bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add data/ output/ config/
          git diff --cached --quiet || git commit -m "chore: update tracker data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
