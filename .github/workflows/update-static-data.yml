name: Update Static Data

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build tracker binary
        run: go build -o tracker ./cmd/tracker

      - name: Refresh static data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./tracker --refresh-static

      - name: Commit and push changes
        run: |
          git config user.name "Military Tracker Bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add data/static/
          git diff --cached --quiet || git commit -m "chore: refresh static data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
