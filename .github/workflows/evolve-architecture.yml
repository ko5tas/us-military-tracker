name: Evolve Architecture

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-qwen2.5-1.5b
          restore-keys: |
            ollama-models-

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:1.5b

      - name: Build tracker binary
        run: go build -o tracker ./cmd/tracker

      - name: Run architecture evolution
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_HOST: http://localhost:11434
        run: ./tracker --evolve

      - name: Commit and push changes
        run: |
          git config user.name "Military Tracker Bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add config/ data/ evolution/
          git diff --cached --quiet || git commit -m "chore: evolve architecture [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
