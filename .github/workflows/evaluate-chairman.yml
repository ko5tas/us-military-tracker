name: Evaluate Chairman

on:
  workflow_run:
    workflows: ["Update Tracker"]
    types:
      - completed

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-qwen2.5-1.5b
          restore-keys: |
            ollama-models-

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:1.5b

      - name: Build tracker binary
        run: go build -o tracker ./cmd/tracker

      - name: Run chairman evaluation
        env:
          OLLAMA_HOST: http://localhost:11434
        run: ./tracker --evaluate

      - name: Commit and push changes
        run: |
          git config user.name "Military Tracker Bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add config/ data/
          git diff --cached --quiet || git commit -m "chore: evaluate chairman performance [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
